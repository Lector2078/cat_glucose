services:
  web:
    build:
      context: ..
      dockerfile: infra/Dockerfile.web
    container_name: cat_glucose_web
    restart: unless-stopped
    env_file:
      - ../.env
    depends_on:
      - postgres
    ports:
      - "8000:8000"

  postgres:
    image: postgres:16-alpine
    container_name: cat_glucose_postgres
    restart: unless-stopped
    env_file:
      - ../.env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    expose:
      - "5432"

  metabase:
    image: metabase/metabase:v0.53.4
    container_name: cat_glucose_metabase
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      MB_DB_FILE: /metabase-data/metabase.db
    volumes:
      - metabase_data:/metabase-data
    depends_on:
      - postgres
    ports:
      - "3000:3000"

volumes:
  postgres_data:
  metabase_data:
